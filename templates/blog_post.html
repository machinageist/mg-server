{% extends "base.html" %}
{% block content %}
<article>
  <header class="post-header">
    <h1>{{ post.title }}</h1>
    <div class="post-meta"> 
      <span class="post-date">{{ post.date }}</span>
      <span class="post-tags">
        {% for tag in post.tags %}
          <span class="tag">{{ tag }}</span>
        {% endfor %}
      </span>
    </div>
  </header>

  <div class="post-content">
    {{ post.content_html|safe }}
  </div>
</article>
{% endblock %}
